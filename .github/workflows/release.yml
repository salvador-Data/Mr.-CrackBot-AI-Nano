name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-crackbot-nano
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt platformio
      - name: Run host tests
        env:
          PYTHONPATH: .
          MR_CRACKBOT_SIMULATION: "1"
          MR_CRACKBOT_SKIP_INTRO: "1"
          MR_CRACKBOT_USE_AI: "0"
        run: pytest tests/ -v
      - name: Build Cardputer firmware
        working-directory: cardputer
        run: pio run -e m5stack-crackbot
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: cardputer/.pio/build/m5stack-crackbot/firmware.bin
          generate_release_notes: true
